# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    # Use ["main", "master"] for CI only on the default branch.
    # Use ["**"] for CI on all branches.
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        # Update this as needed:
        # Common platforms: ["ubuntu-latest", "macos-latest", "windows-latest"]
        os: ["ubuntu-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    # Linux only by default. Use ${{ matrix.os }} for other OSes.
    runs-on: ${{ matrix.os }}

    steps:
      # Generally following uv docs:
      # https://docs.astral.sh/uv/guides/integration/github/

      - name: Checkout (official GitHub action)
        uses: actions/checkout@v6
        with:
          # Important for versioning plugins:
          fetch-depth: 0

      - name: Install uv (official Astral action)
        # Pinned to a full, immutable version tag. As of v8, setup-uv no longer
        # publishes floating major/minor tags (e.g. `@v8`), so bump this exact
        # version when updating.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          # Update this as needed:
          version: "0.11.12"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python (using uv)
        run: uv python install

      # Alternately can use the official Python action:
      # - name: Set up Python (using actions/setup-python)
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: ${{ matrix.python-version }}

      - name: Set supply-chain cool-off cutoff
        # uv's --exclude-newer takes a date, not a relative duration, so compute
        # "14 days ago" at run time. This keeps CI from resolving releases too new
        # to have been vetted. (Assumes a Linux runner with GNU date.)
        run: echo "UV_EXCLUDE_NEWER=$(date -u -d '14 days ago' +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Install all dependencies
        run: uv sync --all-extras

      - name: Run linting
        # Check-only mode so CI fails on unformatted code instead of fixing it.
        run: uv run python devtools/lint.py --check

      - name: Run tests
        run: uv run pytest